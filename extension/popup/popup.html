<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频去重检查</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      min-height: 320px;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      font-size: 13px;
      background: #fff;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .logo { font-size: 20px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .info-label { color: #888; flex-shrink: 0; margin-right: 12px; }
    .info-value { text-align: right; word-break: break-all; max-width: 240px; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: #667eea; color: #fff; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-warning { background: #f59e0b; color: #fff; }
    .btn-ghost { background: #f0f0f0; color: #555; }
    .result-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
    }
    .result-card.strong { border-color: #ef4444; background: #fef2f2; }
    .result-card.medium { border-color: #f59e0b; background: #fffbeb; }
    .result-card.weak { border-color: #3b82f6; background: #eff6ff; }
    .match-item {
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 11px;
    }
    .match-item:last-child { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 4px;
    }
    .badge-red { background: #fecaca; color: #991b1b; }
    .badge-yellow { background: #fde68a; color: #92400e; }
    .badge-blue { background: #bfdbfe; color: #1e40af; }
    .badge-green { background: #bbf7d0; color: #166534; }
    .stats { display: flex; gap: 12px; font-size: 11px; }
    .stats-item { text-align: center; }
    .stats-num { font-size: 16px; font-weight: 700; color: #667eea; }
    .hidden { display: none !important; }
    .status-bar {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: #888;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="logo">🎬</span>
    <h1>视频去重下载助手</h1>
  </div>

  <!-- 视频信息 -->
  <div class="section" id="videoInfo">
    <div class="section-title">📄 当前页面视频</div>
    <div id="videoInfoContent" class="hidden">
      <div class="info-row"><span class="info-label">标题</span><span class="info-value" id="vTitle">-</span></div>
      <div class="info-row"><span class="info-label">时长</span><span class="info-value" id="vDuration">-</span></div>
      <div class="info-row"><span class="info-label">来源</span><span class="info-value" id="vSource">-</span></div>
      <div class="info-row" style="margin-top:8px;"><span class="info-label" style="line-height:24px;">📁 下载路径</span><input type="text" id="vDownloadPath" placeholder="e.g. D:\downloads\video.mp4" style="flex:1;padding:3px 6px;font-size:11px;border:1px solid #ddd;border-radius:4px;" /></div>
      <div class="info-row"><span class="info-label" style="line-height:24px;">📦 大小(MB)</span><input type="number" id="vSizeMb" placeholder="自动检测" step="0.1" min="0" style="flex:1;padding:3px 6px;font-size:11px;border:1px solid #ddd;border-radius:4px;" /></div>
    </div>
    <div id="videoInfoNone" class="status-bar hidden">未检测到视频信息</div>
  </div>

  <!-- 操作按钮 -->
  <div class="section">
    <div class="section-title">⚡ 操作</div>
    <button class="btn btn-primary" id="btnCheck">🔍 检查是否重复</button>
    <button class="btn btn-success hidden" id="btnAdd">➕ 确认添加到库</button>
    <button class="btn btn-ghost" id="btnRefresh">🔄 重新扫描页面</button>
  </div>

  <!-- 检查结果 -->
  <div class="section hidden" id="resultSection">
    <div class="section-title" id="resultTitle">📊 检查结果</div>
    <div id="resultContent"></div>
  </div>

  <!-- 快捷统计 -->
  <div class="section" id="statsSection">
    <div class="section-title">📈 库统计</div>
    <div class="stats" id="statsContent">
      <span class="spinner"></span> 加载中...
    </div>
  </div>

  <!-- 状态 -->
  <div class="status-bar" id="statusBar">就绪</div>

  <script src="popup.js"></script>
</body>
</html>
